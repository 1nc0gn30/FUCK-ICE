<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Melt The Machine social preview</title>
  <desc id="desc">Bold protest poster style art with text FUCK ICE and a smile icon.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#160f23" />
      <stop offset="45%" stop-color="#7a1d2a" />
      <stop offset="100%" stop-color="#f26b1d" />
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffe5c2" />
      <stop offset="100%" stop-color="#f8b36a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="4" flood-opacity="0.45" />
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.5" />
  <circle cx="1030" cy="120" r="150" fill="#ffd64d" opacity="0.2" />
  <circle cx="120" cy="560" r="140" fill="#111111" opacity="0.3" />

  <g transform="rotate(-5 600 315)" filter="url(#shadow)">
    <rect x="80" y="130" width="1040" height="365" fill="#0d0d0d" stroke="#f4d9b7" stroke-width="8" />
    <rect x="96" y="146" width="1008" height="333" fill="none" stroke="#f26b1d" stroke-width="4" />
  </g>

  <g font-family="'Arial Black', Impact, sans-serif" text-anchor="middle">
    <text x="600" y="300" font-size="170" font-weight="900" fill="url(#metal)" stroke="#000000" stroke-width="8" paint-order="stroke">
      FUCK ICE
    </text>
    <text x="600" y="368" font-size="62" font-weight="800" letter-spacing="6" fill="#f7f0df">
      MELT THE MACHINE
    </text>
  </g>

  <g transform="translate(210 430)">
    <circle cx="0" cy="0" r="56" fill="#ffd64d" stroke="#0b0b0b" stroke-width="8" />
    <line x1="-20" y1="-16" x2="-4" y2="-2" stroke="#0b0b0b" stroke-width="8" stroke-linecap="round" />
    <line x1="-4" y1="-16" x2="-20" y2="-2" stroke="#0b0b0b" stroke-width="8" stroke-linecap="round" />
    <line x1="20" y1="-16" x2="4" y2="-2" stroke="#0b0b0b" stroke-width="8" stroke-linecap="round" />
    <line x1="4" y1="-16" x2="20" y2="-2" stroke="#0b0b0b" stroke-width="8" stroke-linecap="round" />
    <path d="M-26 18 Q0 42 26 18" fill="none" stroke="#0b0b0b" stroke-width="8" stroke-linecap="round" />
  </g>

  <g opacity="0.95" stroke="#fff0d8" stroke-width="4">
    <path d="M785 108 L1130 70" />
    <path d="M780 520 L1125 555" />
    <path d="M70 72 L415 112" />
  </g>

  <text x="1090" y="602" text-anchor="end" font-family="'Arial Black', Impact, sans-serif" font-size="26" font-weight="700" fill="#f8e4c6">
    meltthemachine.nealfrazier.tech
  </text>
</svg>
